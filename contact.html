<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — TakeHomeCalc.net</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#060d0a; --surface:#0a1510; --card:#0f1e16; --border:#1a3324; --emerald:#10b981; --emerald-light:#34d399; --emerald-dim:#064e3b; --gold:#f59e0b; --gold-light:#fbbf24; --text:#ecfdf5; --text-muted:#6b9e87; --text-dim:#2d5544; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',sans-serif; font-weight:300; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(16,185,129,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,0.04) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }
  .glow { position:fixed; top:-150px; left:50%; transform:translateX(-50%); width:900px; height:400px; background:radial-gradient(ellipse,rgba(16,185,129,0.1) 0%,transparent 65%); pointer-events:none; z-index:0; }
  header { position:relative; z-index:10; padding:0 40px; height:68px; display:flex; align-items:center; border-bottom:1px solid var(--border); background:rgba(6,13,10,0.9); backdrop-filter:blur(20px); }
  .logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .logo-mark { width:34px; height:34px; background:linear-gradient(135deg,var(--emerald),var(--gold)); border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .logo-text { font-size:1.15rem; font-weight:800; color:var(--text); }
  .logo-text span { color:var(--emerald-light); }
  .content { position:relative; z-index:1; max-width:580px; margin:0 auto; padding:60px 24px 100px; }
  h1 { font-size:2rem; font-weight:800; letter-spacing:-0.02em; margin-bottom:10px; }
  h1 span { background:linear-gradient(135deg,var(--emerald-light),var(--gold-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { color:var(--text-muted); font-size:0.95rem; margin-bottom:36px; line-height:1.7; }
  .form-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:32px; }
  .field { display:flex; flex-direction:column; gap:7px; margin-bottom:18px; }
  label { font-size:0.75rem; font-weight:600; color:var(--text-muted); letter-spacing:0.04em; }
  input, textarea, select { background:var(--surface); border:1px solid var(--border); color:var(--text); padding:11px 14px; border-radius:10px; font-family:'Plus Jakarta Sans',sans-serif; font-size:0.92rem; outline:none; transition:border-color 0.2s; width:100%; }
  input:focus, textarea:focus { border-color:var(--emerald); background:rgba(16,185,129,0.04); }
  textarea { resize:vertical; min-height:100px; line-height:1.6; }
  select { cursor:pointer; appearance:none; }
  .submit-btn { width:100%; background:linear-gradient(135deg,var(--emerald),#059669); color:#fff; border:none; padding:14px; font-family:'Plus Jakarta Sans',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; border-radius:10px; margin-top:6px; transition:all 0.2s; }
  .submit-btn:hover { opacity:0.9; transform:translateY(-1px); }
  .success { display:none; margin-top:14px; padding:14px 18px; background:rgba(16,185,129,0.1); border-left:2px solid var(--emerald); color:var(--emerald-light); font-size:0.85rem; border-radius:0 8px 8px 0; }
  footer { position:relative; z-index:1; border-top:1px solid var(--border); padding:28px 40px; display:flex; justify-content:space-between; }
  footer p, footer a { font-size:0.75rem; color:var(--text-dim); text-decoration:none; }
  @media(max-width:768px) { header{padding:0 16px} footer{flex-direction:column;gap:10px} }
</style>
</head>
<body>
<div class="glow"></div>
<header>
  <a href="index.html" class="logo">
    <div class="logo-mark">💷</div>
    <span class="logo-text">TakeHome<span>Calc</span></span>
  </a>
</header>
<div class="content">
  <h1>Get in <span>Touch</span></h1>
  <p class="subtitle">Found an error in our calculations? Have a suggestion? We'd love to hear from you.</p>
  <div class="form-card">
    <div class="field"><label>Your Name</label><input type="text" id="name" placeholder="John Smith"></div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="john@example.com"></div>
    <div class="field">
      <label>Subject</label>
      <select id="subject">
        <option value="">Select a topic...</option>
        <option>Calculation error</option>
        <option>Wrong tax rate</option>
        <option>Feature request</option>
        <option>General feedback</option>
        <option>Partnership / advertising</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field"><label>Message</label><textarea id="message" placeholder="Tell us more..."></textarea></div>
    <button class="submit-btn" onclick="handleSubmit()">Send Message →</button>
    <div class="success" id="successMsg">✓ Message sent! We'll get back to you within 2 business days.</div>
  </div>
</div>
<footer>
  <p>© 2025 TakeHomeCalc.net — Estimates only. Not financial advice.</p>
  <div style="display:flex;gap:20px"><a href="privacy.html">Privacy</a><a href="about.html">About</a></div>
</footer>
<script>
function handleSubmit() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();
  if (!name || !email || !message) { alert('Please fill in all required fields.'); return; }
  document.getElementById('successMsg').style.display = 'block';
  const btn = document.querySelector('.submit-btn');
  btn.disabled = true; btn.textContent = 'Sent ✓';
  btn.style.background = 'var(--emerald)';
}
</script>
</body>
</html>
